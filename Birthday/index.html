<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Greetings</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Sour+Gummy:wght@600;900&display=swap" rel="stylesheet">

<body>

    <div class="container d-flex justify-content-center">
        <div class="card p-5 birthday-card border-0">
            <div class="card-header bg-transparent border-bottom-0">
                <h1 class="text-uppercase display-3 card-title text-center main-title">happy birthday angel!</h1>
                <h3 class="text-center fw-light card-subtitle text-capitalize sub-title mt-3">click the cake to reveal a surprise</h3>
            </div>
            
            <a href="gift.html">
                <div class="card-body text-center mt-4">
                <img id="cakeBtn" class="bday-cake" src="images/bdaycake.png" width="180" height="auto" alt="Birthday Cake">
            </div>
            </a>
        </div>
    </div>
    
<script src="js/script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
